version: '3.8'

# Single-process stack: FastAPI backend (analysis runs via BackgroundTasks)
# + Next.js frontend. Postgres/R2/Redis/Clerk/Anthropic are all optional —
# with a blank .env the stack runs in open demo mode (SQLite + local storage).

networks:
  internal:
    driver: bridge

volumes:
  backend_data:

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_data:/tmp/sushi   # SQLite db + local file storage + logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
