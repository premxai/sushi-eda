version: '3.8'

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  backend_logs:

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── Redis (Celery broker + job-status cache + share tokens) ─────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Celery beat (scheduler for monitor checks) ───────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
