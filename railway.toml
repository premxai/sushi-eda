# Railway monorepo configuration
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

# ── Backend (FastAPI) ──────────────────────────────────────────────────────────
# Railway service name: "backend"
# Root directory: /backend
# Start: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
# Health check: GET /health

# ── Celery Worker ──────────────────────────────────────────────────────────────
# Railway service name: "worker"
# Root directory: /backend
# Start: celery -A worker worker --loglevel=info --concurrency=2
# No public port needed

# ── Celery Beat ────────────────────────────────────────────────────────────────
# Railway service name: "beat"
# Root directory: /backend
# Start: celery -A worker beat --loglevel=info --schedule=/tmp/celerybeat-schedule
# No public port needed

# ── Recommended Railway services ───────────────────────────────────────────────
# Add via Railway dashboard:
#   - Redis (Railway plugin)          → injects REDIS_URL automatically
#   - PostgreSQL (Railway plugin)     → injects DATABASE_URL automatically
#
# Env vars (set in each service's Variables tab).
# Everything is optional — with nothing set the API runs in open demo mode
# (SQLite in /tmp, local file storage, no auth, AI off). For production:
#   ENVIRONMENT           production (then ALLOWED_ORIGINS becomes required)
#   ALLOWED_ORIGINS       comma-separated frontend origins
#   CLERK_SECRET_KEY      your Clerk backend key (strongly recommended publicly)
#   DATABASE_URL          injected by Railway Postgres plugin
#   REDIS_URL             injected by Railway Redis plugin
#   CELERY_BROKER_URL     = $REDIS_URL (needed by worker/beat services)
#   CELERY_RESULT_BACKEND = $REDIS_URL/1
# Optional integrations:
#   ANTHROPIC_API_KEY     enables AI narrative/chat features
#   R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_BUCKET_NAME
#                         Cloudflare R2 storage (falls back to local files)
#   STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET   billing
#   CONNECTOR_SECRET_KEY  Fernet key for connector credentials
#   SLACK_SIGNING_SECRET / SLACK_BOT_TOKEN      Slack app
#   SENTRY_DSN            Sentry project DSN
