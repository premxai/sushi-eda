<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sushi EDA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #171717;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header-logo { font-size: 20px; }
    .header-title { font-weight: 700; font-size: 15px; color: #171717; }
    .header-subtitle { font-size: 11px; color: #737373; }

    /* ── Settings link ── */
    .settings-link {
      margin-left: auto;
      font-size: 11px;
      color: #737373;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-link:hover { color: #171717; }

    /* ── Section ── */
    .section { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a3a3a3;
      margin-bottom: 8px;
    }

    /* ── Table list ── */
    .table-list { display: flex; flex-direction: column; gap: 4px; }
    .table-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      transition: background 0.12s;
    }
    .table-item:hover { background: #f0fdf4; border-color: #bbf7d0; }
    .table-item-icon { font-size: 14px; flex-shrink: 0; }
    .table-item-info { flex: 1; min-width: 0; }
    .table-item-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .table-item-meta { font-size: 10px; color: #737373; }
    .table-item-btn {
      font-size: 10px;
      font-weight: 600;
      color: #16a34a;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .table-item-btn:hover { background: #dcfce7; }

    /* ── CSV links ── */
    .csv-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .csv-link:hover { background: #f5f5f5; }
    .csv-link-icon { font-size: 12px; color: #16a34a; }
    .csv-link-name {
      flex: 1;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #404040;
    }
    .csv-link-btn {
      font-size: 10px;
      color: #737373;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
    }
    .csv-link-btn:hover { color: #171717; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: #a3a3a3;
      font-size: 12px;
      padding: 8px 0;
    }

    /* ── Status bar ── */
    .status {
      padding: 8px 16px;
      font-size: 11px;
      color: #737373;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
    .status.loading { color: #2563eb; }

    /* ── Settings panel ── */
    #settings-panel { padding: 12px 16px; }
    .form-label { font-size: 11px; color: #737373; margin-bottom: 4px; display: block; }
    .form-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    .form-input:focus { border-color: #22c55e; }
    .btn-primary {
      width: 100%;
      padding: 7px;
      background: #171717;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn-primary:hover { background: #404040; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div class="header">
  <span class="header-logo">🍣</span>
  <div>
    <div class="header-title">Sushi EDA</div>
    <div class="header-subtitle">Serve your raw data perfectly</div>
  </div>
  <span class="settings-link" id="toggle-settings">⚙ Settings</span>
</div>

<!-- ── Main panel ─────────────────────────────────────────────────────────── -->
<div id="main-panel">
  <!-- Tables detected on page -->
  <div class="section" id="tables-section">
    <div class="section-title">Tables on this page</div>
    <div class="table-list" id="table-list">
      <div class="empty">Scanning…</div>
    </div>
  </div>

  <!-- CSV / data file links -->
  <div class="section" id="csv-section">
    <div class="section-title">Data links</div>
    <div id="csv-list">
      <div class="empty">Scanning…</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status-bar"></div>
</div>

<!-- ── Settings panel ─────────────────────────────────────────────────────── -->
<div id="settings-panel" class="hidden">
  <label class="form-label">Sushi API URL</label>
  <input type="url" id="api-url-input" class="form-input" placeholder="https://api.sushi-eda.com" />

  <label class="form-label">API Key</label>
  <input type="password" id="api-key-input" class="form-input" placeholder="sk_..." />

  <label class="form-label">Org ID</label>
  <input type="text" id="org-id-input" class="form-input" placeholder="default" />

  <button class="btn-primary" id="save-settings">Save</button>
  <div class="status" id="settings-status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
